[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = -ra --strict-markers --strict-config
markers =
    integration: testes que dependem de Postgres real (precisa TEST_DATABASE_URL)
    unit: testes puros sem dependência externa
    regression: testes que protegem contra regressão em comportamento existente
