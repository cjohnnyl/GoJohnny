# Postgres efêmero para a suíte de testes da Fase 1.
#
# COMO USAR
#   docker compose -f docker-compose.test.yml up -d
#   export TEST_DATABASE_URL=postgresql://gojohnny:gojohnny@localhost:55432/gojohnny_test
#   pytest
#   docker compose -f docker-compose.test.yml down -v   # limpa o volume
#
# DETALHES
#   - Porta 55432 (não-padrão) para não colidir com Postgres local que
#     o desenvolvedor possa ter na 5432.
#   - Volume nomeado para inspeção; é destruído com `down -v`.
#   - Credenciais são triviais — somente para teste local.

services:
  gojohnny-test-db:
    image: postgres:16-alpine
    container_name: gojohnny-test-db
    environment:
      POSTGRES_USER: gojohnny
      POSTGRES_PASSWORD: gojohnny
      POSTGRES_DB: gojohnny_test
    ports:
      - "55432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gojohnny -d gojohnny_test"]
      interval: 2s
      timeout: 3s
      retries: 20
    volumes:
      - gojohnny_test_pgdata:/var/lib/postgresql/data

volumes:
  gojohnny_test_pgdata:
